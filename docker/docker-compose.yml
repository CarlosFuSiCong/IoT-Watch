# IoT Watch — Docker Compose
# Usage: docker compose -f docker/docker-compose.yml up -d

name: iotwatch

services:
  mqtt:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: iotwatch
      POSTGRES_PASSWORD: iotwatch
      POSTGRES_DB: iotwatch
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # backend: uncomment when backend/ exists, build via docker/Dockerfile.backend

volumes:
  postgres_data:
