# IoT Watch — Docker Compose
# Usage: docker compose -f docker/docker-compose.yml up -d --build

name: iotwatch

services:

  # ── Infrastructure ────────────────────────────────────────────────────────

  mqtt:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER:     iotwatch
      POSTGRES_PASSWORD: iotwatch
      POSTGRES_DB:       iotwatch
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iotwatch"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Application ───────────────────────────────────────────────────────────

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://iotwatch:iotwatch@db:5432/iotwatch
      MQTT_HOST:    mqtt
      MQTT_PORT:    "1883"
    depends_on:
      db:
        condition: service_healthy
      mqtt:
        condition: service_started

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
